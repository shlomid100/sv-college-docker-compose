services:
  app:
    image: python-app:0.1
    container_name: python-app
    ports:
      - 3000:3000
    environment:
      PORT: 3000
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USERNAME: root
      MYSQL_ROOT_PASSWORD: Sd230391!
      MYSQL_DATABASE: mysql
  mysql:
    image: mysql
    container_name: mysqldb
    ports:
      - 3306:3306 
    volumes:
      - sv_mysql_data:/data/db
    environment:
      MYSQL_ROOT_PASSWORD: Sd230391!
      MYSQL_DATABASE: mysql

volumes:
  sv_mysql_data:
    external: true
